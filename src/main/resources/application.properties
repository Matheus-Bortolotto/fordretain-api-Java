server.port=8080

oracle.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@//oracle.fiap.com.br:1521/orcl}
oracle.datasource.username=${ORACLE_USER}
oracle.datasource.password=${ORACLE_PASSWORD}
oracle.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@//oracle.fiap.com.br:1521/orcl}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.level.com.ford.fordretain=DEBUG
logging.level.org.springframework.web=INFO

jwt.secret=${JWT_SECRET:ford-retain-fiap-2026-chave-secreta-muito-longa-e-segura-256bits}
jwt.expiration=86400000

security.rate-limit.requests-per-minute=60