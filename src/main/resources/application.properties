# ================================
# FordRetain API - Configurações
# ================================

# Servidor
server.port=8080

# ================================
# Banco de Dados - Oracle MySQL
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/fordretain_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# Flyway - Migrações
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================
# Swagger / OpenAPI
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# Logs
# ================================
logging.level.com.ford.fordretain=DEBUG
logging.level.org.springframework.web=INFO
